name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'typewriter-book/**'
      - '.github/workflows/deploy-book.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v4
        with:
          mdbook-version: '0.4'
          # mdbook-linkcheck to broken links in book
          mdbook-version-pre: ''

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache mdbook
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-mdbook-${{ hashFiles('**/book.toml') }}
          restore-keys: |
            ${{ runner.os }}-mdbook-

      - name: Build mdBook
        run: |
          cd typewriter-book
          mdbook build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: typewriter-book/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
